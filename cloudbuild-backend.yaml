# Deploy the Firebase Functions backend (and Firestore rules/indexes)
# via Cloud Build. Run with:
#   gcloud builds submit --config=cloudbuild-backend.yaml .
#
# Prerequisites (one-time, see docs/setup-firebase.md for the full list):
#   1. Firebase project enabled on static-webbing-461904-c4
#   2. Firestore + Auth enabled in Firebase Console
#   3. Cloud Build service account
#      (<project-number>@cloudbuild.gserviceaccount.com) has these roles:
#        - Firebase Admin                 (roles/firebase.admin)
#        - Cloud Functions Developer      (roles/cloudfunctions.developer)
#        - Service Account User           (roles/iam.serviceAccountUser) on
#          the Functions runtime SA
#        - Cloud Build Service Account    (already default)
#   4. The FAL_KEY secret created (only required once upscale ships):
#        gcloud secrets create FAL_KEY --replication-policy=automatic
#        echo -n "<key>" | gcloud secrets versions add FAL_KEY --data-file=-

steps:
  - name: 'node:20'
    entrypoint: 'bash'
    dir: 'backend/functions'
    args:
      - '-c'
      - |
        set -euo pipefail
        npm ci
        npm run build

  - name: 'node:20'
    # DEV-ONLY: ALLOW_TEST_CREDITS=true enables the grantTestCredits faucet
    # function (see backend/functions/src/test-credits.ts). This lets us develop
    # and test Phase G billing flows without the $25 Play Console fee or real
    # Google Play Billing.
    #
    # REMOVE this env var (and re-deploy) once Phase G is published-ready
    # (Play Console paid + SKUs live + real BillingClient verified). When
    # unset, grantTestCredits refuses every call and is also conditionally
    # excluded from index.ts exports — defense in depth. See plan task G2.5
    # Step 4: docs/superpowers/plans/2026-05-01-md3e-redesign.md.
    env:
      - 'ALLOW_TEST_CREDITS=true'
    entrypoint: 'bash'
    dir: 'backend'
    args:
      - '-c'
      - |
        set -euo pipefail
        npm install -g firebase-tools@13
        # Storage initialized in Firebase Console on 2026-05-05 (production
        # mode, us-central1). Rules in backend/storage.rules apply per-uid
        # isolation — each user can read/write only under users/{uid}/**.
        firebase deploy \
          --project static-webbing-461904-c4 \
          --only functions,firestore:rules,firestore:indexes,storage \
          --non-interactive \
          --force

options:
  logging: CLOUD_LOGGING_ONLY
  # Functions deploy can be slow on cold cache; bump default 10-min timeout.
timeout: '1800s'
