name: Test Battery

# RC21: full unit + instrumentation test battery on legacy + modern Android API
# levels. Excludes anything that hits FAL (paid) — the AI upscale tests run with
# an offline-only fixture set and the foreground-service / network paths are
# either mocked at test time or skipped via instrumentation arg.
#
# Runs on push to master/feat/** when app/** or this workflow change.

on:
  push:
    branches: [master, "feat/**"]
    paths:
      - 'app/**'
      - '.github/workflows/test-battery.yml'
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/test-battery.yml'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.11.1
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.11.1/bin" >> $GITHUB_PATH

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          # Decode the real google-services.json if the secret is set; fall back
          # to a stub for forks / unconfigured branches.
          if [ -n "$GS_B64" ]; then
            echo "$GS_B64" | base64 -d > app/google-services.json
          else
            cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "stub",
              "storage_bucket": "stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {"package_name": "com.posterpdf"}
              },
              "oauth_client": [],
              "api_key": [{"current_key": "AIzaStubAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}],
              "services": {"appinvite_service": {"other_platform_oauth_client": []}}
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Run unit tests
        run: gradle test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 7

  instrumentation-tests:
    name: Instrumentation (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [23, 28, 33]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.11.1
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.11.1/bin" >> $GITHUB_PATH

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GS_B64" ]; then
            echo "$GS_B64" | base64 -d > app/google-services.json
          else
            cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "stub",
              "storage_bucket": "stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {"package_name": "com.posterpdf"}
              },
              "oauth_client": [],
              "api_key": [{"current_key": "AIzaStubAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}],
              "services": {"appinvite_service": {"other_platform_oauth_client": []}}
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-default

      - name: Create AVD + warm cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD warmed"

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: gradle connectedDebugAndroidTest --stacktrace -Pandroid.testInstrumentationRunnerArguments.excludeFAL=true

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-reports-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: warn
          retention-days: 7
