name: Build Android

# Primary Android pipeline (replaced cloudbuild.yaml on 2026-05-02 after
# the A/B run produced byte-identical APKs in 7m59s vs CB's 28m29s).
# Backend deploys still go through cloudbuild-backend.yaml since that
# pipeline's SA already has the right Firebase/Functions IAM roles.
#
# Secrets required (set 2026-05-02 via gh secret set):
#   RELEASE_KEYSTORE_BASE64     - base64 of release.keystore
#   GOOGLE_SERVICES_JSON_BASE64 - base64 of app/google-services.json
#
# Keystore passwords are still hardcoded in app/build.gradle.kts for v1
# (matches Cloud Build behavior). TODO 4 step 3 moves them to env vars
# as a follow-up; not blocking.

on:
  push:
    branches: [master, "feat/**"]
    paths:
      - 'app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # AGP 8.8.x -> Gradle 8.10.2. Project has no wrapper today, so
      # download Gradle directly. Once a wrapper lands, swap this for
      # actions/setup-gradle reading the wrapper version.
      - name: Install Gradle 8.10.2
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10.2/bin" >> $GITHUB_PATH

      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 -d > release.keystore
          ls -la release.keystore

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GS_B64" | base64 -d > app/google-services.json
          python3 -c 'import json; json.load(open("app/google-services.json"))' \
            && echo "google-services.json: valid JSON"

      - name: Build (assembleDebug + bundleRelease)
        run: gradle assembleDebug bundleRelease --stacktrace

      - name: Upload artifacts
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 7
