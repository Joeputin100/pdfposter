name: Build Android (md3e A/B vs Cloud Build)

# Mirrors cloudbuild.yaml's `gradle assembleDebug bundleRelease` so we can
# compare wall-clock + outputs against Cloud Build for TODO 1 (GH Actions
# migration). Triggered on push to feat/md3e-redesign and on demand via
# workflow_dispatch.
#
# Secrets required (already provisioned 2026-05-02):
#   RELEASE_KEYSTORE_BASE64     - base64 of release.keystore
#   GOOGLE_SERVICES_JSON_BASE64 - base64 of app/google-services.json
#
# Keystore passwords are still hardcoded in app/build.gradle.kts for the
# A/B test (matches Cloud Build today). TODO 4 step 3 moves them to
# env vars; do that as a follow-up before promoting this workflow.

on:
  push:
    branches: [feat/md3e-redesign]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # AGP 8.8.x -> Gradle 8.10.2. Project has no wrapper today, so
      # download Gradle directly. Once a wrapper lands, swap this for
      # actions/setup-gradle reading the wrapper version.
      - name: Install Gradle 8.10.2
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10.2/bin" >> $GITHUB_PATH

      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 -d > release.keystore
          ls -la release.keystore

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GS_B64" | base64 -d > app/google-services.json
          python3 -c 'import json; json.load(open("app/google-services.json"))' \
            && echo "google-services.json: valid JSON"

      - name: Build (assembleDebug + bundleRelease)
        run: gradle assembleDebug bundleRelease --stacktrace

      - name: Upload artifacts
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 7
