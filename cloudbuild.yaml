steps:
  # Fetch persistent keystore
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    entrypoint: 'gsutil'
    args: ['cp', 'gs://static-webbing-461904-c4_artifacts/release.keystore', '.']

  # Build and sign the Android app
  - name: 'cimg/android:2024.01'
    entrypoint: '/bin/bash'
    args: ['-c', 'sudo chown -R circleci:circleci . && gradle assembleDebug']

artifacts:
  objects:
    location: 'gs://static-webbing-461904-c4_artifacts/build'
    paths: ['app/build/outputs/apk/debug/*.apk']

options:
  logging: CLOUD_LOGGING_ONLY
